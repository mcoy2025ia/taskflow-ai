name: CI / CD

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    env:
      # Public vars needed for `next build` static analysis
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: https://taskflow.vercel.app
      # Server-side vars consumed at build time
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EMBED_INTERNAL_SECRET: ${{ secrets.EMBED_INTERNAL_SECRET }}
      CHAT_PROVIDER: groq

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Quality gates ──────────────────────────────────────────────────────
      - name: Lint (zero warnings)
        run: npx next lint --max-warnings 0

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        run: npm run test:coverage
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # ── Production build ───────────────────────────────────────────────────
      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Vercel Production
    needs: ci
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://taskflow.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment & project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production (Vercel)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy pre-built artifact to production
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
